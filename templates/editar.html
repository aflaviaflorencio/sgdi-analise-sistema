{% extends "base.html" %}

{% block content %}

<div class="form-card">
    <h2>Editar Demanda</h2>

    <form method="POST" action="/editar/{{ demanda[0] }}">

        <div class="form-group">
            <label>Título</label>
            <input type="text" name="titulo" value="{{ demanda[1] }}">
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea name="descricao" rows="5">{{ demanda[2] }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Solicitante</label>
                <input type="text" name="solicitante" value="{{ demanda[3] }}">
            </div>

            <div class="form-group">
                <label>Data de Criação</label>
                <input type="text" value="{{ demanda[4] }}" disabled>
            </div>
        </div>

        <div class="form-group">
            <label>Prioridade</label>
            <select name="prioridade">
                <option value="Alta" {% if demanda[5] == 'Alta' %}selected{% endif %}>Alta</option>
                <option value="Media" {% if demanda[5] == 'Media' %}selected{% endif %}>Média</option>
                <option value="Baixa" {% if demanda[5] == 'Baixa' %}selected{% endif %}>Baixa</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Atualizar</button>

            <a href="/" class="btn-secondary">Cancelar</a>

            <!-- 🔴 BOTÃO EXCLUIR AQUI -->
            <a href="/deletar/{{ demanda[0] }}" class="btn-danger"
               onclick="return confirm('Tem certeza que deseja excluir esta demanda?')">
                Excluir
            </a>
        </div>

    </form>
</div>

{% endblock %}
