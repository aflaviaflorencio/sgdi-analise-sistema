{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Cadastro</h2>
        <p>Crie sua conta</p>

        <form method="POST">
            <input type="text" name="nome" placeholder="Novo usuário" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Cadastrar</button>
        </form>

        <div class="auth-link">
            Já possui conta? <a href="/login">Fazer login</a>
        </div>
    </div>
</div>
{% endblock %}
