{% extends "base.html" %}

{% block content %}

<div class="form-card">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Lista de Demandas</h2>

        <a href="/nova_demanda" class="btn-primary">+ Nova Demanda</a>
    </div>

    <!-- FILTRO -->
    <form method="GET" action="/" class="filtro-form">
    <label>Filtrar:</label>

    <select name="prioridade">
        <option value="Todas">Todas</option>
        <option value="Alta">Alta</option>
        <option value="Media">Média</option>
        <option value="Baixa">Baixa</option>
    </select>

    <button type="submit">Filtrar</button>
    </form>

    <!-- TABELA -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Solicitante</th>
                <th>Data</th>
                <th>Prioridade</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
        {% for demanda in demandas %}
        <tr>
            <td>{{ demanda[0] }}</td>
            <td>{{ demanda[1] }}</td>
            <td>{{ demanda[3] }}</td>
            <td>{{ demanda[4] }}</td>

            <td>
                <span class="
                    {% if demanda[5] == 'Alta' %}alta
                    {% elif demanda[5] == 'Media' %}media
                    {% else %}baixa
                    {% endif %}
                ">
                    {{ demanda[5] }}
                </span>
            </td>

            <!-- 🔥 AÇÕES ATUALIZADAS -->
            <td class="acoes">
                <a href="/detalhes/{{ demanda[0] }}" class="btn-link">Ver</a>
                <a href="/editar/{{ demanda[0] }}" class="btn-outline">Editar</a>
            </td>

        </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
